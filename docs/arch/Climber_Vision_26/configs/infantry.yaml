#####-----gimbal参数-----#####
com_port: "/dev/ttyACM0"
baudrate: 115200
speed_control: true
bullet_speed: 22.0 # m/s

#####-----handeye标定参数-----#####
height: 0.0
grid_num: 100
grid_size: 0.01



#####-----planner-----#####
fire_thresh: 0.00035


max_yaw_acc: 50
Q_yaw: [9e6, 0]
R_yaw: [1]

max_pitch_acc: 100
Q_pitch: [9e6, 0]
R_pitch: [1]

