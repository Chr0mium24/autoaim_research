enemy_color: "red"
#enemy_color: "blue"

tradition_detect: false
#####-----神经网络参数-----#####
yolo_name: yolov5
classify_model: assets/tiny_resnet.onnx
yolo11_model_path: assets/yolo11.xml
yolov8_model_path: assets/yolov8.xml
yolov5_model_path: assets/yolov5.xml
device: GPU
min_confidence: 0.7 #0.8 #原检测阈值
use_traditional: false

#####-----ROI-----#####
roi: 
  x: 420
  y: 50
  width: 600
  height: 600

use_roi: false

#####-----传统方法参数-----#####
threshold: 150.0 #S
max_angle_error: 45 # degree
min_lightbar_ratio: 1.5
max_lightbar_ratio: 20
min_lightbar_length: 8
min_armor_ratio: 1
max_armor_ratio: 5
max_side_ratio: 1.5
max_rectangular_error: 25 # degree
# min_confidence: 0.8

#####-----tracker参数-----#####
min_detect_count: 5               #追踪检测次数阈值
max_temp_lost_count: 10           #装甲板最大丢失帧数
outpost_max_temp_lost_count: 10   #前哨站最大丢失帧数

#####-----aimer参数-----#####
air_resistance_k: 0.016  # 线性空气阻力系数，0=真空弹道
yaw_offset: 0 # degree -2.5
pitch_offset: 0 # degree 2
comming_angle: 60 # degree
leaving_angle: 20 # degree
decision_speed: 10 # rad/s
high_speed_delay_time: 0.026 # s
low_speed_delay_time: 0.010 # s
# high_speed_delay_time: 1.0 # s
# low_speed_delay_time: 1.0 # s

#####-----shooter参数-----#####
first_tolerance: 2 # 近距离射击容差，degree
second_tolerance: 1 # 远距离射击容差，degree
judge_distance: 3 #距离判断阈值
auto_fire: true # 是否由自瞄控制射击
 
camera_name: "hikrobot"
mode: 1
exposure_ms: 8
gain: 12
vid_pid: "2bdf:0001"

#  1  0  0
#  0  1  0
#  0  0  1

