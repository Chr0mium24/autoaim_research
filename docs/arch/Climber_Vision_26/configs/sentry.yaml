enemy_color: "red"
# enemy_color: "blue"

tradition_detect: false
#####-----神经网络参数-----#####
yolo_name: yolov8
classify_model: assets/tiny_resnet.onnx
yolo11_model_path: assets/yolo11.xml
yolov8_model_path: assets/yolov8.xml
yolov5_model_path: assets/yolov5.xml
device: GPU
min_confidence: 0.8
use_traditional: true

#####-----ROI-----#####
roi: 
  x: 420
  y: 50
  width: 600
  height: 600

use_roi: false

#####-----传统方法参数-----#####
threshold: 150.0
max_angle_error: 45 # degree
min_lightbar_ratio: 1.5
max_lightbar_ratio: 20
min_lightbar_length: 8
min_armor_ratio: 1
max_armor_ratio: 5
max_side_ratio: 1.5
max_rectangular_error: 25 # degree

#####-----tracker参数-----#####
min_detect_count: 3
max_temp_lost_count: 25
outpost_max_temp_lost_count: 75


#####-----aimer参数-----#####
air_resistance_k: 0.016  # 线性空气阻力系数，0=真空弹道
yaw_offset: 0 # degree
pitch_offset: 0 # degree
comming_angle: 55 # degree
leaving_angle: 20 # degree
decision_speed: 8 # rad/s
high_speed_delay_time: 0.015 # s
low_speed_delay_time: 0.015 # s

#####-----shooter参数-----#####
first_tolerance: 2 # 近距离射击容差，degree
second_tolerance: 0.2  # 远距离射击容差，degree
judge_distance: 4 #距离判断阈值
auto_fire: true # 是否由自瞄控制射击

camera_name: "hikrobot"
exposure_ms: 4
gain: 14
vid_pid: "2bdf:0001"

# R_gimbal2imubody: [0, 1, 0,
#                   -1, 0, 0,
#                   0, 0, 1]
R_gimbal2imubody: [1, 0, 0,
                  0, 1, 0,
                  0, 0, 1]


# 重投影误差: 0.5875px
camera_matrix: [2392.7066032289049, 0, 733.35950647541574, 0, 2390.729645145419, 554.59749243984515, 0, 0, 1]
distort_coeffs: [0.016501965568465244, -0.20983076650369323, -0.0010867536026780763, -0.0030913619750234339, 0]



# R_camera2gimbal: [0, 0, 1, -1, 0, 0, 0, -1, 0]
# t_camera2gimbal: [0.11, 0.00, 0.075]
R_camera2gimbal: [-0.0209424, 0, 0.999781, -0.999781, 0, -0.0209424, 0, -1, 0]
t_camera2gimbal: [0.11, 0.0, 0.075]
# t_camera2gimbal: [0.11, 0.05, 0.075]     #左正右负
# 相机同理想情况的偏角: yaw1.23 pitch-0.86 roll1.53 degree
# 标定板到世界原点水平距离: 2.07 m
# 标定板同竖直摆放时的偏角: yaw77.91 pitch4.01 roll-179.51 degree
