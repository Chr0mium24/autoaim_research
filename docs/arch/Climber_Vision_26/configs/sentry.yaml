# t_camera2gimbal: [0.097739602733347003, -0.024411830749465516, 0.077919415180755194]



#####-----handeye标定参数-----#####
height: 0.0
grid_num: 100
grid_size: 0.01

#####-----gimbal参数-----#####
com_port: "/dev/ttyAIM"
baudrate: 921600
speed_control: true
bullet_speed: 30  # m/s

#####-----planner-----#####
fire_thresh: 0.01



max_yaw_acc: 10
Q_yaw: [9e5, 0]
R_yaw: [3]

max_pitch_acc: 50
Q_pitch: [9e5, 0]
R_pitch: [3]

#####-----USB相机参数-----#####
image_width: 640.0
image_height: 480.0
# usb_exposure: 120.0
usb_frame_rate: 30.0
usb_gamma: 5.0
usb_gain: 5.0

# 相机设备名映射
camera_name_map:
  camera_back_left:
    yaw: -140.0
    fov_h: 60.0
    fov_v: 45.0
    flip: true
  camera_back_right:
    yaw: 140.0
    fov_h: 60.0
    fov_v: 45.0
    flip: true
#####-----全向感知参数-----#####
perception_device: CPU  # 感知相机推理设备: CPU 或 GPU
default_fov_h: 60.0  # 默认水平视场角（度）
default_fov_v: 45.0  # 默认垂直视场角（度600）
perception_pitch_offset: 0  # 全局默认pitch补偿，未在camera_name_map中配置时生效（degree）
omni_memory_duration_ms: 400  # 全向感知记忆延时，单位ms
mode: 1  # 决策模式
