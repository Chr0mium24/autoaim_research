%YAML:1.0
---
# 无人机规划器参数

planner:
  latency: 15                    # Average total latency from PC to yaw action complete (in ms) # 65
  single_shoot_latency: 65       # (in ms), shoot latency of single shoot # 步兵：95， 无人机：65
  continue_shoot_latency: 45     # (in ms), shoot frequency of continuous shoot
  same_trace_threshold: 0.003   # (in rad), trajectory tracking consistency threshold
  pitch_comp: 0.02               # Pitch compensation # 步兵： 0.03， 无人机：0.01
  yaw_comp: 0.0                  # Yaw compensation
  disable_vehicle_center_shoot_mode: 1
  disable_armor_with_vehicle_shoot_mode: 0
  consider_air_resistence: 0
