%YAML:1.0
---
# 步兵4规划器参数

planner:
  latency: 5                    # Average total latency from PC to yaw action complete (in ms) # 35 
  single_shoot_latency: 90       # (in ms), shoot latency of single shoot # 150
  continue_shoot_latency: 45     # (in ms), shoot frequency of continuous shoot
  same_trace_threshold: 0.0035   # (in rad), trajectory tracking consistency threshold
  pitch_comp: 0.015               # Pitch compensation
  yaw_comp: 0                  # Yaw compensation
  disable_vehicle_center_shoot_mode: 0
  disable_armor_with_vehicle_shoot_mode: 1
  consider_air_resistence: 0
